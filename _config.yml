# Site settings
title: Gavin Gleinig
name: Gavin Gleinig
description: "Master of Computer Science | Deep Learning, Computer Vision, ML"
url: "https://gavingleinig.github.io"
repository: "gavingleinig/gavingleinig.github.io"
search: true

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "default"

plugins:
  - jekyll-include-cache
  - jekyll-remote-theme
  - jekyll-sitemap

# Hide the theme's default RSS feed atom link
atom_feed:
  hide: true

# Author / sidebar profile
author:
  name     : "Gavin Gleinig"
  avatar   : "/assets/images/bio-photo.jpg"
  bio      : "MS Computer Science at Texas A&M. Deep Learning, Computer Vision, and ML."
  location : "College Station, Texas"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:gavingleinig@gmail.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/gavingleinig"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/gavin-gleinig"

# Footer
footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:gavingleinig@gmail.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/gavingleinig"

# Collections
collections:
  portfolio:
    output: true
    permalink: /projects/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      show_date: false
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: false
      toc: true
      toc_sticky: true
      show_date: false

# Include _pages so files there are routed by their permalink/front-matter
include:
  - _pages

# Build
markdown: kramdown
